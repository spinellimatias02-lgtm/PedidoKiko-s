<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiko´s Burguer - Pedidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --kiko-red: #e63946; --kiko-yellow: #ffb703; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: var(--kiko-red); color: white; font-weight: bold; }
        .card-img-top { height: 200px; object-fit: cover; }
        .btn-order { background-color: #25d366; color: white; font-weight: bold; width: 100%; padding: 15px; font-size: 1.2rem; }
        .btn-order:hover { background-color: #128c7e; color: white; }
        .badge-price { background-color: var(--kiko-yellow); color: #000; font-size: 1rem; }
    </style>
</head>
<body>

<nav class="navbar sticky-top">
    <div class="container justify-content-center">
        <span class="navbar-brand mb-0 h1">🍔 KIKO´S BURGUER</span>
    </div>
</nav>

<div class="container my-4">
    <h2 class="text-center mb-4">Haz tu pedido aquí</h2>
    
    <div class="row g-3">
        <div class="col-6 col-md-3">
            <div class="card h-100">
                <div class="card-body p-2 text-center">
                    <h6>Onion Butter</h6>
                    <span class="badge badge-price mb-2">$11.700</span>
                    <input type="number" class="form-control form-control-sm item-qty" data-name="Clásica Kiko" value="0" min="0">
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card h-100">
                <div class="card-body p-2 text-center">
                    <h6>Alley Oop</h6>
                    <span class="badge badge-price mb-2">$13.500</span>
                    <input type="number" class="form-control form-control-sm item-qty" data-name="Doble Queso" value="0" min="0">
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card h-100">
                <div class="card-body p-2 text-center">
                    <h6>Old Times</h6>
                    <span class="badge badge-price mb-2">$10.800</span>
                    <input type="number" class="form-control form-control-sm item-qty" data-name="Bacon Especial" value="0" min="0">
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card h-100">
                <div class="card-body p-2 text-center">
                    <h6>Eggcelent</h6>
                    <span class="badge badge-price mb-2">$12.700</span>
                    <input type="number" class="form-control form-control-sm item-qty" data-name="La Kiko Monster" value="0" min="0">
                </div>
            </div>
        </div>
    </div>

    <hr class="my-4">

    <div class="card p-3 shadow-sm">
        <h5>Tus datos:</h5>
        <div class="mb-3">
            <label class="form-label">Nombre completo</label>
            <input type="text" id="userName" class="form-control" placeholder="Ej: Juan Pérez">
        </div>
        <div class="mb-3">
            <label class="form-label">Dirección / Mesa</label>
            <input type="text" id="userAddress" class="form-control" placeholder="Ej: Calle Falsa 123 o Mesa 5">
        </div>
        <div class="mb-3">
            <label class="form-label">Observaciones</label>
            <textarea id="userNotes" class="form-control" rows="2" placeholder="Ej: Sin cebolla, mucha servilleta..."></textarea>
        </div>
        
        <button onclick="enviarPedido()" class="btn btn-order">
            ENVIAR PEDIDO POR WHATSAPP 📱
        </button>
    </div>
</div>

<script>
    function enviarPedido() {
        // 1. TU NÚMERO DE TELÉFONO (Sin el +)
        const miTelefono = "5491122334455"; // <-- CAMBIA ESTO

        // 2. Obtener datos del cliente
        const nombre = document.getElementById('userName').value;
        const direccion = document.getElementById('userAddress').value;
        const notas = document.getElementById('userNotes').value;

        if(!nombre || !direccion) {
            alert("Por favor completa tu nombre y dirección.");
            return;
        }

        // 3. Obtener los productos seleccionados
        let productosTexto = "";
        const inputs = document.querySelectorAll('.item-qty');
        
        inputs.forEach(input => {
            const cantidad = parseInt(input.value);
            if (cantidad > 0) {
                const nombreProducto = input.getAttribute('data-name');
                productosTexto += `- ${cantidad} x ${nombreProducto}%0A`;
            }
        });

        if(productosTexto === "") {
            alert("¡Debes elegir al menos una hamburguesa!");
            return;
        }

        // 4. Armar el mensaje final
        let mensaje = `*PEDIDO PARA KIKO´S BURGUER*%0A%0A`;
        mensaje += `*Nombre:* ${nombre}%0A`;
        mensaje += `*Dirección:* ${direccion}%0A%0A`;
        mensaje += `*Productos:*%0A${productosTexto}%0A`;
        
        if(notas) {
            mensaje += `*Notas:* ${notas}%0A`;
        }

        // 5. Redirigir a WhatsApp
        const url = `https://wa.me/${5401165954925}?text=${mensaje}`;
        window.open(url, '_blank');
    }
</script>

</body>
</html>
