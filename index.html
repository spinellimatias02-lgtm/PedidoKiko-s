<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiko´s Burguer - Pedidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        :root { 
            --kiko-red: #e63946; 
            --kiko-yellow: #ffb703; 
            --kiko-orange-dark: #b84a00; 
            --kiko-green: #25d366;
        }

        body { 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1571091718767-18b5b1457add?q=80&w=2072&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            font-family: 'Segoe UI', Roboto, sans-serif; 
            color: white;
        }

        .navbar { 
            background-image: url('https://images.unsplash.com/photo-1582216839352-f67f6b0f37d0?q=80&w=1600&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-radius: 0 0 20px 20px;
            padding: 15px 0;
        }

        .navbar-brand.h1 {
            font-family: 'Permanent Marker', cursive;
            font-size: 2.5rem;
            color: var(--kiko-orange-dark) !important;
            text-shadow: 
                -2px -2px 0 #000,  
                 2px -2px 0 #000,
                -2px  2px 0 #000,
                 2px  2px 0 #000,
                 4px 4px 12px rgba(0,0,0,0.9);
            letter-spacing: 2px;
        }

        .card { 
            background: rgba(255, 255, 255, 0.95); 
            border: none; 
            border-radius: 25px; 
            overflow: hidden;
            transition: transform 0.3s;
            color: #333;
        }

        .card:hover { transform: translateY(-5px); }

        .card-img-top { 
            height: 160px; 
            object-fit: cover; 
            border-bottom: 3px solid var(--kiko-yellow);
        }

        .btn-order { 
            background-color: var(--kiko-green); 
            color: white; 
            font-weight: bold; 
            width: 100%; 
            padding: 15px; 
            font-size: 1.2rem; 
            border-radius: 50px; 
            border: none;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
        }

        .btn-order:hover { 
            background-color: #1ebe5d; 
            color: white; 
            transform: scale(1.02);
        }

        .badge-price { 
            background-color: var(--kiko-red); 
            color: white; 
            font-size: 1rem; 
            padding: 8px 15px;
            border-radius: 50px;
        }

        .form-control { border-radius: 15px; border: 2px solid #eee; }
        h6 { font-weight: 800; text-transform: uppercase; margin-top: 10px; color: #222; }
    </style>
</head>
<body>

<nav class="navbar sticky-top">
    <div class="container justify-content-center text-center">
        <span class="navbar-brand mb-0 h1">KIKO´S BURGUER</span>
    </div>
</nav>

<div class="container my-4">
    <h2 class="text-center mb-4 text-white">Haz tu pedido aquí</h2>
    
    <div class="row g-3">
        <div class="col-6 col-md-3">
            <div class="card h-100 shadow">
                <img src="https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?q=80&w=500&auto=format&fit=crop" class="card-img-top" alt="Onion Butter">
                <div class="card-body p-2 text-center">
                    <h6>Onion Butter</h6>
                    <p class="small text-muted mb-1">Carne, Queso y Cebolla Caramelizada</p>
                    <span class="badge badge-price mb-2">$11.700</span>
                    <input type="number" class="form-control form-control-sm item-qty text-center" data-name="Onion Butter" value="0" min="0">
                </div>
            </div>
        </div>

        <div class="col-6 col-md-3">
            <div class="card h-100 shadow">
                <img src="https://images.unsplash.com/photo-1553979459-d2229ba7433b?q=80&w=500&auto=format&fit=crop" class="card-img-top" alt="Alley Oop">
                <div class="card-body p-2 text-center">
                    <h6>Alley Oop</h6>
                    <p class="small text-muted mb-1">Doble carne, cheddar y bacon crocante</p>
                    <span class="badge badge-price mb-2">$13.500</span>
                    <input type="number" class="form-control form-control-sm item-qty text-center" data-name="Alley Oop" value="0" min="0">
                </div>
            </div>
        </div>

        <div class="col-6 col-md-3">
            <div class="card h-100 shadow">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=500&auto=format&fit=crop" class="card-img-top" alt="Old Times">
                <div class="card-body p-2 text-center">
                    <h6>Old Times</h6>
                    <p class="small text-muted mb-1">Lechuga, tomate y cebolla</p>
                    <span class="badge badge-price mb-2">$10.800</span>
                    <input type="number" class="form-control form-control-sm item-qty text-center" data-name="Old Times" value="0" min="0">
                </div>
            </div>
        </div>

        <div class="col-6 col-md-3">
            <div class="card h-100 shadow">
                <img src="https://images.unsplash.com/photo-1621813136284-f3c5b8b8f2d7?q=80&w=500&auto=format&fit=crop" class="card-img-top" alt="Eggcellent">
                <div class="card-body p-2 text-center">
                    <h6>Eggcellent</h6>
                    <p class="small text-muted mb-1">Doble carne, cebolla y huevo</p>
                    <span class="badge badge-price mb-2">$12.700</span>
                    <input type="number" class="form-control form-control-sm item-qty text-center" data-name="Eggcellent" value="0" min="0">
                </div>
            </div>
        </div>
    </div>

    <div class="card p-4 mt-5 shadow-lg border-0" style="background: rgba(255,255,255,0.98); border-radius: 30px;">
        <h4 class="fw-bold mb-3">Finaliza tu pedido:</h4>
        <button onclick="enviarPedido()" class="btn btn-order">
            ENVIAR PEDIDO 🚀
        </button>
    </div>
</div>

<script>
    function enviarPedido() {
        // Redirección al video de Rick Astley
        const urlRick = "http://www.youtube.com/watch?v=dQw4w9WgXcQ";
        window.open(urlRick, '_blank');
    }
</script>

</body>
</html>
